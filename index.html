<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<title>LOCO-P｜着せ替えできるスマホケース</title>
<style>html,body{margin:0;padding:0;background:#FFFDF8;-webkit-tap-highlight-color:transparent;}#root{min-height:100vh;}</style>
</head>
<body>
<div id="root"></div>
<script>
/* =========================================================
   LOCO-P 機種リスト（機種追加はこのブロックだけ編集すればOK）
   ---------------------------------------------------------
   1機種 = 1行。models の配列に行を足すだけで画面に追加されます。
     name   : アプリに表示される機種名（お客さま向け・MCC-B等は付けない）
     tag    : 機械のテンプレート名（注文メールに載る・機械の右上表示と同じにする）
     ratio  : ケースの 横÷縦 の比率（スマホはだいたい 0.46〜0.49）
     cam    : カメラの見た目 → "two-diag"(斜め2眼) / "two-vert"(縦2眼) /
              "three"(3眼) / "single"(1眼カプセル) / "wide"(横長バー) /
              "pixel"(Pixelバイザー型) / "galaxy"
     island : カメラ穴の位置と大きさ（ケースに対する割合 x,y,w,h / r=角丸 0.5で完全カプセル）
   ========================================================= */
(function () {
  var ISL = { x: 0.05, y: 0.05, w: 0.40, h: 0.21, r: 0.06 }; // 標準のカメラ島
  window.LOCOP_DEVICES = [
    { id: "iphone", label: "iPhone", models: [
      { name: "iPhone SE（第2/3世代）", tag: "iPhone SE-MCC-B",  ratio: 0.49, cam: "single",   island: { x: 0.055, y: 0.04, w: 0.30, h: 0.075, r: 0.5 } },
      { name: "iPhone 12",         tag: "iPhone 12-MCC-B",       ratio: 0.48, cam: "two-vert", island: { x: 0.05, y: 0.05, w: 0.34, h: 0.16, r: 0.06 } },
      { name: "iPhone 13 / 14",    tag: "iPhone 13/14-MCC-B",    ratio: 0.48, cam: "two-diag", island: ISL },
      { name: "iPhone 15",         tag: "iPhone 15-MCC-B",       ratio: 0.47, cam: "two-diag", island: ISL },
      { name: "iPhone 15 Pro",     tag: "iPhone 15Pro-MCC-B",    ratio: 0.47, cam: "three",    island: ISL },
      { name: "iPhone 16",         tag: "iPhone 16-MCC-B",       ratio: 0.47, cam: "two-vert", island: ISL },
      { name: "iPhone 16e",        tag: "iPhone 16e-MCC-B",      ratio: 0.47, cam: "single",   island: { x: 0.05, y: 0.05, w: 0.42, h: 0.09, r: 0.5 } },
      { name: "iPhone 16 Pro",     tag: "iPhone 16Pro-MCC-B",    ratio: 0.47, cam: "three",    island: ISL },
      { name: "iPhone 16 Pro Max", tag: "iPhone 16ProMax-MCC-B", ratio: 0.48, cam: "three",    island: ISL },
      { name: "iPhone 17",         tag: "iPhone 17-MCC-B",       ratio: 0.47, cam: "two-vert", island: ISL },
      { name: "iPhone 17 Pro",     tag: "iPhone 17Pro-MCC-B",    ratio: 0.47, cam: "wide",     island: { x: 0.04, y: 0.04, w: 0.92, h: 0.25, r: 0.06 } },
      { name: "iPhone 17 Pro Max", tag: "iPhone 17ProMax-MCC-B", ratio: 0.48, cam: "wide",     island: { x: 0.04, y: 0.04, w: 0.92, h: 0.24, r: 0.06 } }
    ] },
    { id: "galaxy", label: "Galaxy", models: [
      { name: "Galaxy S26",  tag: "SAMSUNG S26-MCC-B", ratio: 0.46, cam: "galaxy", island: { x: 0.05, y: 0.045, w: 0.44, h: 0.34, r: 0.06 } },
      { name: "Galaxy A55",  tag: "SAMSUNG A55-MCC-B", ratio: 0.48, cam: "galaxy", island: { x: 0.05, y: 0.04, w: 0.40, h: 0.32, r: 0.06 } },
      { name: "Galaxy A56",  tag: "SAMSUNG A56-MCC-B", ratio: 0.48, cam: "galaxy", island: { x: 0.05, y: 0.04, w: 0.40, h: 0.32, r: 0.06 } }
    ] },
    { id: "google", label: "Google Pixel", models: [
      { name: "Pixel 8a", tag: "Google Pixel8A-MCC-B", ratio: 0.48, cam: "pixel", island: { x: 0.06, y: 0.05, w: 0.52, h: 0.11, r: 0.5 } },
      { name: "Pixel 9a", tag: "Google Pixel9A-MCC-B", ratio: 0.47, cam: "pixel", island: { x: 0.06, y: 0.045, w: 0.42, h: 0.10, r: 0.5 } },
      { name: "Pixel 10", tag: "Google Pixel10-MCC-B", ratio: 0.47, cam: "pixel", island: { x: 0.05, y: 0.045, w: 0.68, h: 0.14, r: 0.5 } }
    ] }
  ];
})();
</script>

function bgName(c){
  var h=(c==null?"":(""+c)).trim().toUpperCase();
  if(h.charAt(0)!=="#")h="#"+h;
  var P={"#FFFFFF":"白","#000000":"黒","#3FA9F5":"ブルー","#FF8FB1":"ピンク","#19C3A6":"ミントグリーン","#FFE08A":"イエロー","#F4F2EC":"オフホワイト"};
  if(P[h])return P[h];
  var m=/^#([0-9A-F]{6})$/.exec(h);
  if(!m)return h||"白";
  var n=parseInt(m[1],16),r=(n>>16)&255,g=(n>>8)&255,b=n&255;
  var mx=Math.max(r,g,b),mn=Math.min(r,g,b),d=mx-mn,L=(mx+mn)/510;
  if(d<20)return L>0.9?"白系":L>0.6?"ライトグレー系":L>0.25?"グレー系":"黒系";
  var hue;
  if(mx===r)hue=((g-b)/d+6)%6;
  else if(mx===g)hue=(b-r)/d+2;
  else hue=(r-g)/d+4;
  hue*=60;
  var T=[[15,"赤系"],[45,"オレンジ系"],[68,"イエロー系"],[160,"グリーン系"],[200,"シアン系"],[255,"ブルー系"],[290,"パープル系"],[335,"ピンク系"],[361,"赤系"]];
  var nm="指定色";
  for(var i=0;i<T.length;i++){if(hue<=T[i][0]){nm=T[i][1];break;}}
  if(L<0.25)nm="ダーク"+nm;
  return nm;
}

:root{
  --canvas:#FFFDF8; --ink:#23262F; --soft-ink:#6B6F7B; --primary:#FF6B5E; --primary-d:#F2503F;
  --mint:#15C2A6; --wash:#FFEDE9; --mint-wash:#E7F8F4; --line:#EFE7DB;
  --disp:'M PLUS Rounded 1c','Hiragino Maru Gothic ProN',system-ui,'Segoe UI',sans-serif;
  --body:'Noto Sans JP','Hiragino Sans','Hiragino Kaku Gothic ProN','Yu Gothic',system-ui,sans-serif;
}
*{box-sizing:border-box}
.lp-root{font-family:var(--body);color:var(--ink);background:radial-gradient(120% 60% at 50% -10%, #FFF4EF 0%, var(--canvas) 55%);
  min-height:100vh;max-width:480px;margin:0 auto;display:flex;flex-direction:column;-webkit-font-smoothing:antialiased;padding-bottom:84px;position:relative}
.lp-head{padding:16px 18px 6px;position:sticky;top:0;z-index:5;background:linear-gradient(var(--canvas),rgba(255,253,248,.92));backdrop-filter:blur(6px)}
.lp-brand{display:flex;align-items:center;gap:8px;font-family:var(--disp)}
.lp-brand b{font-weight:800;font-size:21px;letter-spacing:.2px}
.lp-dot{width:14px;height:14px;border-radius:5px;background:var(--primary);box-shadow:3px 3px 0 var(--mint);transform:rotate(-8deg)}
.lp-tag{font-family:var(--body);font-size:11px;color:var(--soft-ink);margin-left:2px;font-weight:500}
.lp-steps{display:flex;gap:6px;margin-top:12px}
.lp-pip{flex:1;display:flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--soft-ink);padding:6px 4px;border-radius:10px;background:#fff;border:1.5px solid var(--line);justify-content:center}
.lp-pip span{width:18px;height:18px;border-radius:50%;background:#EFEAE0;color:var(--soft-ink);display:grid;place-items:center;font-size:11px}
.lp-pip.on{color:var(--primary-d);border-color:var(--primary);background:var(--wash)}
.lp-pip.on span{background:var(--primary);color:#fff}
.lp-pip.done{color:var(--mint)} .lp-pip.done span{background:var(--mint);color:#fff}
.lp-main{padding:6px 18px 18px;flex:1}
.lp-sec{animation:fade .35s ease}
@keyframes fade{from{opacity:0;transform:translateY(6px)}to{opacity:1;transform:none}}
.lp-h1{font-family:var(--disp);font-weight:800;font-size:24px;margin:14px 0 4px}
.lp-lead{font-size:13px;color:var(--soft-ink);margin:0 0 14px;line-height:1.6}
.lp-lead b{color:var(--primary-d)}
.lp-note{font-size:11.5px;color:var(--soft-ink);margin-top:14px;line-height:1.6}
.lp-tabs{display:flex;gap:8px;margin-bottom:14px}
.lp-tab{flex:1;padding:10px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:var(--disp);font-weight:700;font-size:14px;color:var(--soft-ink);cursor:pointer;transition:.15s}
.lp-tab.on{background:var(--ink);color:#fff;border-color:var(--ink)}
.lp-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lp-model{display:flex;align-items:center;gap:7px;padding:12px;border-radius:13px;border:1.5px solid var(--line);background:#fff;font-size:12.5px;font-weight:500;color:var(--ink);cursor:pointer;text-align:left;position:relative;transition:.15s}
.lp-model span{flex:1;line-height:1.3}
.lp-model svg:first-child{color:var(--soft-ink);flex-shrink:0}
.lp-model.on{border-color:var(--primary);background:var(--wash);box-shadow:0 4px 14px rgba(255,107,94,.18)}
.lp-model.on svg:first-child{color:var(--primary-d)}
.lp-mk{color:var(--primary-d)}
.lp-drop{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;padding:46px 20px;border:2px dashed #E3B7AE;border-radius:18px;background:var(--wash);color:var(--primary-d);cursor:pointer;text-align:center}
.lp-drop b{font-family:var(--disp);font-size:16px}
.lp-drop span{font-size:11.5px;color:var(--soft-ink);line-height:1.6;max-width:250px}
.lp-err{margin-top:12px;background:#FFF1EF;border:1.5px solid #F3B4AB;color:#C0392B;border-radius:12px;padding:11px 13px;font-size:12px;line-height:1.65}
.lp-modeltag{text-align:right;font-family:var(--disp);font-weight:700;font-size:12px;color:var(--soft-ink);margin:2px 2px 6px}
.lp-stage{display:flex;justify-content:center;padding:4px 0 2px}
.lp-case{position:relative;overflow:hidden;background:#EFEAE0;touch-action:none;box-shadow:0 14px 34px rgba(35,38,47,.22);cursor:grab}
.lp-case.grab{cursor:grabbing}
.lp-canvas{position:absolute;inset:0;display:block;z-index:1}
.lp-empty{position:absolute;inset:0;z-index:2;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:8px;color:#9a958c;font-size:12px}
.lp-camnote{text-align:center;font-size:11px;color:var(--soft-ink);margin:8px 0 2px;line-height:1.6}
.lp-ctrl{display:flex;align-items:center;gap:10px;margin:14px 4px 6px}
.lp-rnd{width:42px;height:42px;flex-shrink:0;border-radius:12px;border:1.5px solid var(--line);background:#fff;display:grid;place-items:center;color:var(--ink);cursor:pointer}
.lp-rnd:active{background:var(--wash)} .lp-rnd:disabled{opacity:.4;cursor:not-allowed}
.lp-rnd.danger{color:#C0392B;border-color:#F3B4AB}
.lp-range{flex:1;accent-color:var(--primary);height:4px} .lp-range:disabled{opacity:.4}
.lp-order{display:flex;align-items:center;gap:8px;margin:0 4px 12px}
.lp-mini{padding:7px 12px;border-radius:10px;border:1.5px solid var(--line);background:#fff;font-family:var(--disp);font-weight:700;font-size:12px;color:var(--ink);cursor:pointer}
.lp-mini:disabled{opacity:.4;cursor:not-allowed}
.lp-hint{font-size:11px;color:var(--soft-ink);margin-left:auto}
.lp-thumbs{display:flex;gap:9px;overflow-x:auto;padding:4px 2px 8px}
.lp-thumb{flex:0 0 auto;width:58px;height:58px;border-radius:12px;border:2px solid var(--line);background:#fff;padding:0;overflow:hidden;cursor:pointer}
.lp-thumb img{width:100%;height:100%;object-fit:cover;display:block}
.lp-thumb.on{border-color:var(--primary);box-shadow:0 4px 12px rgba(255,107,94,.25)}
.lp-addtile{flex:0 0 auto;width:58px;height:58px;border-radius:12px;border:2px dashed #E3B7AE;background:var(--wash);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:2px;color:var(--primary-d);font-size:10px;font-weight:700;cursor:pointer}
.lp-bgrow{display:flex;align-items:center;gap:10px;margin-top:10px}
.lp-bglabel{font-size:12px;font-weight:700;color:var(--ink)}
.lp-swatches{display:flex;gap:8px;flex-wrap:wrap}
.lp-sw{width:30px;height:30px;border-radius:50%;border:2px solid #fff;box-shadow:0 0 0 1.5px var(--line);cursor:pointer;padding:0}
.lp-sw.on{box-shadow:0 0 0 2.5px var(--primary)}
.lp-swcustom{position:relative;overflow:hidden;background:conic-gradient(red,orange,yellow,lime,aqua,blue,magenta,red)}
.lp-swcustom input{position:absolute;inset:-6px;width:200%;height:200%;border:none;padding:0;cursor:pointer;opacity:0}
.lp-field{margin-bottom:14px}
.lp-label{display:flex;align-items:center;gap:8px;font-size:12.5px;font-weight:700;margin-bottom:6px}
.lp-label i{font-style:normal;font-size:10px;color:#fff;background:var(--primary);padding:1px 6px;border-radius:6px;font-weight:700}
.lp-in,.lp-sel{width:100%;padding:11px 12px;border-radius:11px;border:1.5px solid var(--line);background:#fff;font-family:var(--body);font-size:14px;color:var(--ink);outline:none}
.lp-in:focus,.lp-sel:focus{border-color:var(--primary);box-shadow:0 0 0 3px var(--wash)}
.lp-ta{resize:vertical;line-height:1.5}
.lp-inline{display:flex;gap:10px} .lp-inline .lp-field{flex:1} .lp-inline>.lp-sel{flex:0 0 104px}
.lp-final{display:flex;justify-content:center;padding:6px 0 14px}
.lp-finalimg{max-width:62%;border-radius:14px;box-shadow:0 14px 30px rgba(35,38,47,.18)}
.lp-card{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:6px 16px;margin-bottom:16px}
.lp-li{display:flex;gap:12px;padding:9px 0;border-bottom:1px solid var(--line);font-size:13px}
.lp-li:last-child{border-bottom:none}
.lp-li span{flex:0 0 84px;color:var(--soft-ink);font-weight:500}
.lp-li b{flex:1;font-weight:600;word-break:break-word}
.lp-li b.st{color:var(--primary-d);font-family:var(--disp);font-weight:800;font-size:16px}
.lp-send{background:var(--mint-wash);border-radius:16px;padding:16px}
.lp-sendlead{display:flex;align-items:center;gap:6px;font-family:var(--disp);font-weight:800;font-size:14px;color:#0a9a83;margin:0 0 8px}
.lp-sent{display:flex;align-items:center;gap:7px;background:#fff;border:1.5px solid var(--mint);color:#0a9a83;border-radius:12px;padding:11px 12px;font-size:12.5px;font-weight:700;margin-bottom:12px;line-height:1.5}
.lp-share{width:100%;display:flex;align-items:center;justify-content:center;gap:8px;padding:15px;border:none;border-radius:14px;background:var(--primary);color:#fff;font-family:var(--disp);font-weight:800;font-size:16px;cursor:pointer;box-shadow:0 8px 20px rgba(255,107,94,.4);margin-bottom:10px;text-decoration:none}
.lp-mailbox{display:flex;align-items:center;gap:8px;background:#fff;border:1.5px solid var(--line);border-radius:12px;padding:10px 12px;margin-bottom:12px;flex-wrap:wrap}
.lp-mailboxlabel{font-size:11.5px;font-weight:700;color:var(--soft-ink);white-space:nowrap}
.lp-mailaddr{flex:1;font-family:var(--body);font-size:13px;font-weight:700;color:var(--ink);word-break:break-all;min-width:120px}
.lp-mailcopy{padding:6px 12px;border:1.5px solid var(--primary);background:#fff;color:var(--primary-d);border-radius:9px;font-family:var(--disp);font-weight:700;font-size:12px;cursor:pointer;white-space:nowrap}
.lp-share:disabled{opacity:.72;cursor:not-allowed}
.lp-spin{width:16px;height:16px;border:2.5px solid rgba(255,255,255,.45);border-top-color:#fff;border-radius:50%;display:inline-block;animation:lpspin .7s linear infinite}
@keyframes lpspin{to{transform:rotate(360deg)}}
.lp-warn{margin:10px 0 0;font-size:12.5px;color:#C0392B;line-height:1.6;background:#FDEDEA;border-radius:10px;padding:10px 12px}
.lp-share:active{transform:translateY(1px)}
.lp-shint{font-size:11.5px;color:var(--soft-ink);line-height:1.6;margin:0 0 12px} .lp-shint b{color:#C1275A}
.lp-ol{margin:0 0 14px;padding-left:20px;font-size:12.5px;line-height:1.9;color:var(--ink)}
.lp-actions{display:grid;grid-template-columns:1fr 1fr;gap:9px}
.lp-act{display:flex;align-items:center;justify-content:center;gap:6px;padding:12px 8px;border-radius:12px;border:1.5px solid var(--line);background:#fff;font-family:var(--disp);font-weight:700;font-size:12.5px;color:var(--ink);cursor:pointer;transition:.15s}
.lp-act:active{transform:translateY(1px)}
.lp-act.ig{border-color:#E1306C;color:#C1275A} .lp-act.line{border-color:#06C755;color:#04a047}
.lp-foot{position:fixed;left:0;right:0;bottom:0;max-width:480px;margin:0 auto;display:flex;justify-content:space-between;align-items:center;gap:10px;padding:12px 18px;background:rgba(255,253,248,.95);backdrop-filter:blur(8px);border-top:1px solid var(--line)}
.lp-back{display:flex;align-items:center;gap:4px;background:none;border:none;font-family:var(--disp);font-weight:700;font-size:14px;color:var(--soft-ink);cursor:pointer;padding:8px}
.lp-next{display:flex;align-items:center;gap:4px;background:var(--primary);color:#fff;border:none;border-radius:13px;padding:13px 22px;font-family:var(--disp);font-weight:800;font-size:15px;cursor:pointer;box-shadow:0 6px 16px rgba(255,107,94,.35);transition:.15s}
.lp-next:active{transform:translateY(1px)}
.lp-next:disabled{background:#E8DFD4;color:#B3A998;box-shadow:none;cursor:not-allowed}
button:focus-visible,input:focus-visible,select:focus-visible,a:focus-visible{outline:2.5px solid var(--mint);outline-offset:2px}
@media (prefers-reduced-motion:reduce){.lp-sec{animation:none}}
.lp-step2{display:flex;align-items:center;gap:8px;font-family:var(--disp);font-weight:800;font-size:15px;color:var(--ink);margin:22px 0 10px}
.lp-step2 span{width:24px;height:24px;border-radius:50%;background:var(--primary);color:#fff;display:grid;place-items:center;font-size:13px;flex-shrink:0}
.lp-saveblock{background:#fff;border:1.5px solid var(--line);border-radius:16px;padding:14px;margin-bottom:14px}
.lp-savehead{display:flex;align-items:center;justify-content:space-between;gap:8px;font-weight:700;font-size:13px;color:var(--ink);margin-bottom:8px}
.lp-savehead em{font-style:normal;font-size:11px;font-weight:700;color:var(--primary-d);background:var(--wash);padding:3px 9px;border-radius:999px;white-space:nowrap}
.lp-saveimg{display:flex;justify-content:center;padding:4px 0 12px}
.lp-saveimg img{max-width:66%;border-radius:14px;box-shadow:0 12px 28px rgba(35,38,47,.16);-webkit-touch-callout:default;touch-action:manipulation}
.lp-tiny{font-size:11.5px;color:var(--soft-ink);line-height:1.6;margin:0 0 10px}
.lp-tiny b{color:var(--primary-d)}
.lp-origs{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:12px}
.lp-orig{position:relative;width:88px;height:88px;border-radius:12px;overflow:hidden;border:1.5px solid var(--line);background:#faf7f1}
.lp-orig img{width:100%;height:100%;object-fit:cover;display:block;-webkit-touch-callout:default}
.lp-orig button{position:absolute;right:5px;bottom:5px;display:flex;align-items:center;gap:2px;padding:3px 7px;border:none;border-radius:8px;background:rgba(35,38,47,.82);color:#fff;font-family:var(--disp);font-weight:800;font-size:11px;cursor:pointer}
.lp-act.wide{width:100%;grid-column:1/-1;margin-bottom:2px}
.lp-plans{display:flex;flex-direction:column;gap:12px;margin:2px 0 8px}
.lp-plan{position:relative;display:grid;grid-template-columns:auto 1fr auto;grid-template-areas:"chk name price" "chk note note";column-gap:11px;row-gap:3px;text-align:left;border:2px solid var(--line);background:#fff;border-radius:16px;padding:15px 16px;cursor:pointer;transition:.15s;width:100%;font-family:var(--body)}
.lp-plan.on{border-color:var(--primary);background:var(--wash);box-shadow:0 6px 18px rgba(255,107,94,.18)}
.lp-plan-check{grid-area:chk;width:22px;height:22px;border-radius:50%;border:2px solid var(--line);display:grid;place-items:center;align-self:center;color:#fff}
.lp-plan.on .lp-plan-check{background:var(--primary);border-color:var(--primary)}
.lp-plan-name{grid-area:name;font-family:var(--disp);font-weight:800;font-size:15px;color:var(--ink);align-self:center;line-height:1.3}
.lp-plan-price{grid-area:price;font-family:var(--disp);font-weight:800;font-size:22px;color:var(--primary-d);align-self:center;white-space:nowrap}
.lp-plan-note{grid-area:note;font-size:11.5px;color:var(--soft-ink);line-height:1.55}
